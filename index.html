<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Monetário</title>
    <script type="module" src="config.js"></script>
    <script type="module" src="seletor.js"></script>
    <script type="module" src="conversor.js"></script>
    <script type="module" src="textinput.js"></script>
</head>
<body>

<section id="section-CABECALHO">
    <h1>Conversor Monetário</h1>
    <p>Digite um valor a ser convertido</p>
</section>

<section id="section-SELECAO">
    <label for="origem">De: </label>
    <select name="moeda-select" id="origem"></select>
    <label for="destino">Para: </label>
    <select name="moeda-select" id="destino"></select>
    <button id="button-SWAP">⮂</button>
</section>

<section id="section-textINPUT">
    <label for="valorEntrada" id="label-textINPUT"></label>
    <input type="number" id="valorEntrada" placeholder="Digite um valor...">
    
</section>
<section id="section-RESULTADO">
<p id="resultadoFinal"></p>
</section>
</body>
</html>
