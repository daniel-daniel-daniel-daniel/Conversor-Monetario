<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversor Monetário</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script type="module" src="js/config-vue.js" defer></script>
  </head>
  <body>
    <div id="app">
      <header>
        <div id="txt">
          <h1>Conversor Monetário</h1>
          <p>Digite um valor a ser convertido</p>
        </div>
      </header>

      <section id="SELECAO">
        <div id="txt">
          <label for="origem">De: </label>
        </div>
        <select id="origem" v-model="valOrig">
          <option
            v-for="moeda in moedas"
            :key="moeda.codigo"
            :value="moeda.codigo"
          >
            {{ moeda.nome }}
          </option>
        </select>

        <label for="destino">Para: </label>

        <select id="destino" v-model="valDest">
          <option
            v-for="moeda in moedas"
            :key="moeda.codigo"
            :value="moeda.codigo"
          >
            {{moeda.nome}}
          </option>
        </select>
        <section id="botao">
          <button @click="inverterMoedas">⮂</button>
        </section>
      </section>

      <section id="textINPUT">
        <label for="valorEntrada" id="label-textINPUT"></label>
        <div id="txt">
          <input
            type="number"
            v-model.number="valInput"
            placeholder="Digite um valor..."
          />
        </div>
      </section>

      <section id="RESULTADO">
        <div id="txt">
          <p id="resultadoFinal">{{ resultadoFinal }}</p>
        </div>
      </section>
    </div>
  </body>
</html>
